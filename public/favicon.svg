<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A00"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Dark Rounded Square Background -->
  <rect width="512" height="512" rx="128" fill="#111111" />
  <rect width="480" height="480" x="16" y="16" rx="112" fill="#1B1B1B" stroke="#2C2C2C" stroke-width="8" />
  
  <!-- Dumbbell Icon -->
  <g transform="translate(256,256) rotate(-45) translate(-256,-256)" filter="url(#glow)">
    <!-- Central Bar -->
    <rect x="120" y="236" width="272" height="40" rx="10" fill="url(#orangeGrad)" />
    
    <!-- Left Inner Collar -->
    <rect x="160" y="196" width="24" height="120" rx="8" fill="#FFFFFF" />
    <!-- Left Weight Plate 1 -->
    <rect x="110" y="156" width="36" height="200" rx="12" fill="url(#orangeGrad)" />
    <!-- Left Weight Plate 2 -->
    <rect x="60" y="186" width="36" height="140" rx="10" fill="url(#orangeGrad)" />
    
    <!-- Right Inner Collar -->
    <rect x="328" y="196" width="24" height="120" rx="8" fill="#FFFFFF" />
    <!-- Right Weight Plate 1 -->
    <rect x="366" y="156" width="36" height="200" rx="12" fill="url(#orangeGrad)" />
    <!-- Right Weight Plate 2 -->
    <rect x="416" y="186" width="36" height="140" rx="10" fill="url(#orangeGrad)" />
  </g>
</svg>